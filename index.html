<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>銆婃祦娴湴鐞冦€嬭棰戞紨璁茬増</title>
  <style>
    :root {
      --bg: #050608;
      --fg: #f6efe3;
      --muted: rgba(246, 239, 227, 0.76);
      --line: rgba(255, 255, 255, 0.14);
      --accent: #ff7d43;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--fg);
      font-family: "Noto Serif SC", "Source Han Serif SC", "STZhongsong", "Microsoft YaHei", serif;
    }
    body {
      background:
        radial-gradient(circle at top, rgba(186, 63, 18, 0.18), transparent 28%),
        radial-gradient(circle at bottom right, rgba(42, 76, 145, 0.18), transparent 34%),
        var(--bg);
    }
    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      isolation: isolate;
    }
    .bg-video, .bg-fallback {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      will-change: transform, filter;
    }
    .bg-video {
      z-index: -3;
      filter: none;
      background: #050608;
      object-position: var(--video-pos, center center);
      transform: scale(var(--video-scale, 1));
      transition: transform 480ms ease, opacity 280ms ease;
    }

    .bg-video.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .bg-fallback {
      z-index: -4;
      filter: saturate(1.04) brightness(0.7) contrast(1.02);
      transform: scale(var(--still-scale, 1.02));
      transform-origin: center center;
      object-position: var(--fallback-pos, center center);
      transition: filter 480ms ease, opacity 280ms ease;
    }
    .bg-fallback.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .bg-fallback.animated {
      animation: kenburns 18s ease-in-out infinite alternate;
    }

    .bg-fallback.portrait {
      object-fit: contain;
      object-position: right center;
      transform: scale(0.74);
      filter: saturate(1.02) brightness(0.72) contrast(1.02);
      animation: portraitFloat 16s ease-in-out infinite alternate;
      background: radial-gradient(circle at center, rgba(255,255,255,0.02), transparent 55%);
    }

    .bg-fallback.tone-cold {
      filter: saturate(0.94) brightness(0.66) contrast(1.04);
    }

    .bg-fallback.tone-warm {
      filter: saturate(1.1) brightness(0.72) contrast(1.04);
    }

    .bg-fallback.tone-hope {
      filter: saturate(1.08) brightness(0.74) contrast(1.02);
    }
    .veil {
      position: absolute;
      inset: 0;
      z-index: -2;
      background:
        linear-gradient(90deg, rgba(4, 5, 8, 0.42) 0%, rgba(4, 5, 8, 0.08) 40%, rgba(4, 5, 8, 0.32) 100%),
        linear-gradient(180deg, rgba(4, 5, 8, 0.02), rgba(4, 5, 8, 0.24));
    }

    .veil.image-mode {
      animation: veilPulse 14s ease-in-out infinite alternate;
    }
    .slides {
      position: relative;
      width: 100%;
      height: 100%;
    }
    .slide {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: 1fr;
      align-items: end;
      padding: 6vh 5vw 9vh;
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px);
      transition: opacity 500ms ease, transform 650ms ease;
    }
    .slide.active {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }
    .copy {
      position: relative;
      z-index: 2;
      max-width: min(62rem, 92vw);
    }
    .copy::before {
      content: "";
      position: absolute;
      inset: -2rem -2.5rem -2.4rem -2rem;
      border-radius: 2rem;
      background:
        radial-gradient(circle at 18% 28%, rgba(7, 9, 13, 0.66) 0%, rgba(7, 9, 13, 0.46) 34%, rgba(7, 9, 13, 0.18) 62%, rgba(7, 9, 13, 0.02) 100%),
        linear-gradient(90deg, rgba(7, 9, 13, 0.56) 0%, rgba(7, 9, 13, 0.34) 54%, rgba(7, 9, 13, 0.08) 100%);
      filter: blur(16px);
      opacity: 0.98;
      pointer-events: none;
      z-index: -1;
    }
    .copy > * {
      position: relative;
      z-index: 1;
    }
    .stage.video-mode .copy::before {
      opacity: 0.88;
    }
    .stage.video-mode .slide.cover .copy::before {
      opacity: 0.78;
    }
    .slide.cover {
      align-items: center;
      padding-top: 10vh;
      padding-bottom: 14vh;
    }
    .slide.cover .copy {
      max-width: min(48rem, 90vw);
    }
    .slide.cover .copy::before {
      inset: -2.6rem -2.4rem -3rem -2.4rem;
      background:
        radial-gradient(circle at 50% 28%, rgba(7, 9, 13, 0.58) 0%, rgba(7, 9, 13, 0.34) 42%, rgba(7, 9, 13, 0.12) 74%, rgba(7, 9, 13, 0.02) 100%);
    }
    .slide.tight-copy .copy {
      max-width: min(72rem, 94vw);
    }
    .slide.tight-copy .copy::before {
      inset: -1.5rem -1.9rem -1.8rem -1.6rem;
    }
    .slide.tight-copy .lead {
      max-width: 36em;
      font-size: clamp(0.92rem, 1.08vw, 1.08rem);
      line-height: 1.72;
    }
    body.presenter-mode .stage {
      display: block;
    }
    .presenter-panel {
      display: none;
    }
    body.presenter-mode .presenter-panel {
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
      padding: 2.2rem 3rem 2rem;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(186, 63, 18, 0.12), transparent 26%),
        linear-gradient(180deg, rgba(7, 9, 13, 0.98), rgba(9, 12, 18, 0.98));
      color: #fff4e8;
      z-index: 6;
      overflow: hidden;
    }
    body.presenter-mode .bg-video,
    body.presenter-mode .bg-fallback,
    body.presenter-mode .veil,
    body.presenter-mode .slides,
    body.presenter-mode .timer,
    body.presenter-mode .progress,
    body.presenter-mode .timer-readout,
    body.presenter-mode .bottombar,
    body.presenter-mode #autoBtn,
    body.presenter-mode #autoPageBtn,
    body.presenter-mode #videoBtn,
    body.presenter-mode #musicBtn,
    body.presenter-mode .volume-wrap,
    body.presenter-mode .mask-wrap,
    body.presenter-mode #presenterBtn {
      display: none !important;
    }
    body.presenter-mode .topbar {
      position: static;
      padding: 0;
      margin-bottom: 0.6rem;
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transform: none;
      background: transparent;
    }
    body.presenter-mode .topbar .actions {
      gap: 0.8rem;
    }
    body.presenter-mode .topbar .meta {
      gap: 0.8rem;
    }
    body.presenter-mode .topbar .pill {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.1);
      color: rgba(255,244,232,0.88);
    }
    .presenter-card {
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 1rem;
      background: rgba(255,255,255,0.03);
      padding: 0.9rem 1rem;
    }
    .presenter-card h3 {
      margin: 0 0 0.65rem;
      font-size: 1rem;
      color: #ffd7bc;
      letter-spacing: 0.04em;
    }
    .presenter-card .mini {
      font-size: 0.88rem;
      color: rgba(255,244,232,0.72);
      margin-bottom: 0.55rem;
    }
    .presenter-card .notes {
      white-space: pre-wrap;
      line-height: 1.7;
      font-size: 0.98rem;
    }
    .presenter-actions {
      display: flex;
      gap: 0.65rem;
      flex-wrap: wrap;
    }
    body.presenter-mode .presenter-card:first-child {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0;
      border: none;
      background: transparent;
    }
    body.presenter-mode .presenter-card:first-child h3 {
      margin: 0;
      font-size: 1.05rem;
    }
    body.presenter-mode .presenter-card:nth-child(3) {
      display: none;
    }
    body.presenter-mode .presenter-card:nth-child(2) {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 1.35rem 1.5rem;
      border-radius: 1.5rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
      min-height: 0;
    }
    body.presenter-mode #presenterCurrentTitle {
      font-size: 1.35rem;
      margin-bottom: 0.5rem;
    }
    body.presenter-mode #presenterCurrentMeta {
      margin-bottom: 1rem;
      font-size: 0.95rem;
      color: rgba(255,244,232,0.7);
    }
    body.presenter-mode #presenterCurrentNotes {
      flex: 1;
      overflow: hidden;
      font-size: clamp(2rem, 2.8vw, 3rem);
      line-height: 1.8;
      letter-spacing: 0.02em;
      color: #fff7ef;
      padding-right: 0.35rem;
      position: relative;
    }
    body.presenter-mode #presenterCurrentNotes .teleprompter-content {
      white-space: pre-wrap;
      will-change: transform;
      transform: translateY(0);
    }
    body.presenter-mode #presenterCurrentNotes::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 5rem;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(9, 12, 18, 0), rgba(9, 12, 18, 0.92));
    }
    .slide.cover h1 {
      max-width: none;
      margin: 1.4rem 0 1.4rem;
      font-size: clamp(3.2rem, 6.4vw, 6.4rem);
      letter-spacing: 0.08em;
    }
    .cover-meta {
      display: inline-flex;
      flex-direction: column;
      gap: 0.6rem;
      padding: 1rem 1.2rem;
      border: 1px solid var(--line);
      border-radius: 1.2rem;
      background: rgba(8, 9, 12, 0.28);
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
    }
    .cover-meta .school {
      font-size: clamp(1.02rem, 1.5vw, 1.3rem);
      color: rgba(255, 246, 235, 0.96);
      letter-spacing: 0.04em;
    }
    .cover-meta .author {
      font-size: clamp(1.34rem, 2.2vw, 1.8rem);
      color: #ffd8bc;
      letter-spacing: 0.14em;
    }
    .cover-meta .date {
      font-size: 0.98rem;
      color: rgba(255, 239, 223, 0.76);
      letter-spacing: 0.08em;
    }
    .cover-actions {
      display: flex;
      gap: 0.9rem;
      align-items: center;
      margin-top: 1.6rem;
      flex-wrap: wrap;
    }
    .start-btn {
      appearance: none;
      border: 1px solid rgba(255, 214, 184, 0.48);
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(255, 145, 89, 0.92), rgba(255, 111, 67, 0.86));
      color: #fff8f1;
      padding: 0.9rem 1.55rem;
      font-size: 1rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      box-shadow: 0 18px 36px rgba(255, 111, 67, 0.24);
    }
    .start-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 22px 42px rgba(255, 111, 67, 0.3);
    }
    .start-tip {
      color: rgba(255, 241, 228, 0.76);
      font-size: 0.92rem;
      letter-spacing: 0.03em;
      text-shadow: 0 8px 28px rgba(0,0,0,.34);
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.5rem 0.92rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(9, 10, 14, 0.44);
      color: var(--muted);
      backdrop-filter: blur(10px);
      letter-spacing: 0.08em;
      font-size: 0.92rem;
    }
    .eyebrow::before {
      content: "";
      width: 0.56rem;
      height: 0.56rem;
      border-radius: 50%;
      background: linear-gradient(135deg, #ffcfaa, var(--accent));
      box-shadow: 0 0 18px rgba(255, 125, 67, 0.6);
    }
    h1, h2 {
      margin: 1.2rem 0 1rem;
      line-height: 1.06;
      letter-spacing: 0.05em;
      text-wrap: balance;
      text-shadow: 0 14px 42px rgba(0, 0, 0, 0.44);
      max-width: 10ch;
    }
    h1 { font-size: clamp(3rem, 6vw, 6rem); }
    h2 { font-size: clamp(2.15rem, 4.2vw, 4.5rem); }
    .lead {
      max-width: 28em;
      margin: 0;
      font-size: clamp(1rem, 1.28vw, 1.24rem);
      line-height: 1.9;
      color: rgba(255, 247, 236, 0.97);
      white-space: pre-line;
      text-shadow: 0 8px 28px rgba(0,0,0,.42);
    }
    .topbar, .bottombar {
      position: fixed;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1.2rem 1.4rem;
      z-index: 5;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 220ms ease, visibility 220ms ease;
    }
    .topbar { top: 0; }
    .bottombar { bottom: 0; }
    body.controls-visible .topbar,
    body.controls-visible .bottombar {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }
    .meta, .actions {
      display: flex;
      gap: 0.7rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .pill, .btn {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(8, 9, 12, 0.44);
      color: #fff4e8;
      padding: 0.74rem 1rem;
      font-size: 0.92rem;
      backdrop-filter: blur(10px);
    }
    .btn { cursor: pointer; }
    .volume-wrap {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(8, 9, 12, 0.44);
      color: #fff4e8;
      padding: 0.58rem 0.9rem;
      font-size: 0.9rem;
      backdrop-filter: blur(10px);
    }
    .volume-wrap input[type="range"] {
      width: 96px;
      accent-color: #ff9b68;
      cursor: pointer;
    }

    .mask-wrap {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(8, 9, 12, 0.44);
      color: #fff4e8;
      padding: 0.58rem 0.9rem;
      font-size: 0.9rem;
      backdrop-filter: blur(10px);
    }

    .mask-wrap input[type="range"] {
      width: 96px;
      accent-color: #ffd2a9;
      cursor: pointer;
    }
    .status {
      color: rgba(255, 244, 231, 0.76);
      font-size: 0.9rem;
      line-height: 1.7;
      max-width: 32rem;
    }
    .progress {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 4px;
      z-index: 8;
      background: rgba(255, 255, 255, 0.08);
    }
    .progress > span {
      display: block;
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #ff6336, #ffd2a9);
      box-shadow: 0 0 24px rgba(255, 103, 61, 0.55);
      transition: width 300ms ease;
    }
    .timer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 4px;
      height: 3px;
      z-index: 8;
    }
    .timer > span {
      display: block;
      height: 100%;
      width: 0;
      background: rgba(255, 236, 219, 0.88);
      transition: width 120ms linear;
    }
    .timer-readout {
      position: fixed;
      right: 1.4rem;
      bottom: 1.2rem;
      z-index: 9;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(8, 9, 12, 0.4);
      color: rgba(255, 245, 233, 0.92);
      padding: 0.68rem 0.95rem;
      font-size: 0.9rem;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 32px rgba(0, 0, 0, 0.2);
      letter-spacing: 0.02em;
    }
    .timer-readout strong {
      color: #ffd9bf;
      font-weight: 600;
    }
    .loading-screen {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top, rgba(186, 63, 18, 0.16), transparent 26%),
        linear-gradient(180deg, rgba(6, 8, 12, 0.98), rgba(7, 10, 16, 0.98));
      transition: opacity 360ms ease, visibility 360ms ease;
    }
    .loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .loading-card {
      width: min(34rem, 88vw);
      padding: 1.5rem 1.6rem;
      border-radius: 1.4rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 28px 70px rgba(0,0,0,0.3);
    }
    .loading-title {
      font-size: 1.2rem;
      color: #fff3e6;
      letter-spacing: 0.04em;
      margin-bottom: 0.6rem;
    }
    .loading-text {
      color: rgba(255,244,232,0.72);
      line-height: 1.7;
      margin-bottom: 1rem;
    }
    .loading-bar {
      height: 0.7rem;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.05);
    }
    .loading-bar > span {
      display: block;
      width: 0%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff9b6a, #ffd2b2);
      transition: width 180ms ease;
    }
    .loading-meta {
      margin-top: 0.75rem;
      color: rgba(255,244,232,0.74);
      font-size: 0.92rem;
      letter-spacing: 0.02em;
    }

    @keyframes kenburns {
      0% {
        transform: scale(var(--still-scale, 1.02)) translate3d(0%, 0%, 0);
      }
      35% {
        transform: scale(calc(var(--still-scale, 1.02) + 0.05)) translate3d(-1.2%, -0.6%, 0);
      }
      70% {
        transform: scale(calc(var(--still-scale, 1.02) + 0.08)) translate3d(1.4%, 0.8%, 0);
      }
      100% {
        transform: scale(calc(var(--still-scale, 1.02) + 0.04)) translate3d(-0.8%, 1%, 0);
      }
    }

    @keyframes veilPulse {
      0% {
        opacity: 0.68;
      }
      50% {
        opacity: 0.62;
      }
      100% {
        opacity: 0.72;
      }
    }

    @keyframes portraitFloat {
      0% {
        transform: scale(0.72) translate3d(1%, 0%, 0);
      }
      50% {
        transform: scale(0.75) translate3d(0%, -1%, 0);
      }
      100% {
        transform: scale(0.73) translate3d(-1%, 1%, 0);
      }
    }
    @media (max-width: 980px) {
      .slide { padding: 5rem 1.1rem 7rem; }
      .bottombar { flex-direction: column; align-items: stretch; }
      .lead { max-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="loading-screen" id="loadingScreen">
      <div class="loading-card">
        <div class="loading-title">姝ｅ湪鍔犺浇绱犳潗</div>
        <div class="loading-text" id="loadingText">姝ｅ湪涓烘斁鏄犲噯澶囧浘鐗囥€佽棰戝拰闊充箰锛岃绋嶅€欌€︹€?/div>
        <div class="loading-bar"><span id="loadingBar"></span></div>
        <div class="loading-meta" id="loadingMeta">0 / 0</div>
      </div>
    </div>
    <video class="bg-video" id="bgVideo" muted playsinline preload="auto" autoplay></video>
    <img class="bg-fallback" id="bgFallback" src="./assets/images/01.jpg" alt="鑳屾櫙">
    <div class="veil"></div>
    <main class="slides" id="slides"></main>
    <div class="topbar">
      <div class="meta">
        <span class="pill" id="counter">01 / 13</span>
        <span class="pill">宕旀姢鍒朵綔</span>
      </div>
      <div class="actions">
        <button class="btn" id="autoBtn" type="button">鑷姩鎾斁鏈楄</button>
        <button class="btn" id="autoPageBtn" type="button">鑷姩缈婚〉</button>
        <button class="btn" id="videoBtn" type="button">鎾斁瑙嗛</button>
        <button class="btn" id="musicBtn" type="button">鎾斁闊充箰</button>
        <label class="volume-wrap" for="volumeRange">
          <span>闊抽噺</span>
          <input id="volumeRange" type="range" min="0" max="100" value="72">
        </label>
        <label class="mask-wrap" for="maskRange">
          <span>钂欑増</span>
          <input id="maskRange" type="range" min="0" max="100" value="16">
        </label>
        <button class="btn" id="fullTextBtn" type="button">鍏ㄦ枃瑙嗗浘</button>
        <button class="btn" id="presenterBtn" type="button">婕旇鑰呰鍥?/button>
        <button class="btn" id="fullscreenBtn" type="button">鍏ㄥ睆</button>
      </div>
    </div>
    <div class="bottombar">
      <div class="status" id="status">寰呭惎鍔?/div>
      <div class="status" id="clipInfo">鑳屾櫙寰呭姞杞?/div>
    </div>

    const timerDisplay = document.getElementById("timerDisplay");
    const status = document.getElementById("status");
    const clipInfo = document.getElementById("clipInfo");
    const autoBtn = document.getElementById("autoBtn");
    const autoPageBtn = document.getElementById("autoPageBtn");
    const videoBtn = document.getElementById("videoBtn");
    const musicBtn = document.getElementById("musicBtn");
    const volumeRange = document.getElementById("volumeRange");
    const maskRange = document.getElementById("maskRange");
    const fullTextBtn = document.getElementById("fullTextBtn");
    const presenterBtn = document.getElementById("presenterBtn");
    const fullscreenBtn = document.getElementById("fullscreenBtn");
    const bgm = document.getElementById("bgm");
    const presenterCurrentTitle = document.getElementById("presenterCurrentTitle");
    const presenterCurrentMeta = document.getElementById("presenterCurrentMeta");
    const presenterCurrentNotes = document.getElementById("presenterCurrentNotes");
    const presenterNextTitle = document.getElementById("presenterNextTitle");
    const presenterNextMeta = document.getElementById("presenterNextMeta");
    const presenterNextNotes = document.getElementById("presenterNextNotes");
    const presenterPrevBtn = document.getElementById("presenterPrevBtn");
    const presenterNextBtn = document.getElementById("presenterNextBtn");
    const presenterStatus = document.getElementById("presenterStatus");

    let currentIndex = 0;
    let autoPlaying = false;
    let speechEnabled = false;
    let slideTimer = null;
    let progressTimer = null;
    let timerReadoutTimer = null;
    let segmentStart = 0;
    let segmentEnd = 0;
    let selectedVoice = null;
    let activeUtterance = null;
    let speechToken = 0;
    let wheelLocked = false;
    function getItemDurationMs(item) {
      const base = item.durationMs || estimateDuration(item.text);
      return base + (item.video ? 5000 : 0);
    }

    let pageDurationMs = deck.map(item => getItemDurationMs(item));
    let presentationStartedAt = null;
    let currentPageStartedAt = performance.now();
    let currentPageTargetMs = pageDurationMs[0];
    let controlsTimer = null;
    let reportStarted = false;
    let presenterChannel = null;
    let syncingFromRemote = false;
    let presenterScrollTimer = null;
    let bgmPendingAutoplay = false;
    let assetsReady = false;
    const presenterStateKey = "wandering-earth-grade3-7min-presenter-state";
    const presenterCommandKey = "wandering-earth-grade3-7min-presenter-command";
    let lastPresenterStateTs = 0;
    let lastPresenterCommandTs = 0;

    if (!isPresenter) {
      lastPresenterCommandTs = Date.now();
      try { localStorage.removeItem(presenterCommandKey); } catch {}
    }

    slidesRoot.innerHTML = deck.map((item, idx) => `
      <section class="slide ${idx === 0 ? "active cover" : ""}${[3,4,6].includes(idx) ? " tight-copy" : ""}">
        <div class="copy">
          <span class="eyebrow">${item.pageLabel} 路 绗?${idx + 1} 椤?/span>
          <h${idx === 0 ? "1" : "2"}>${item.title}</h${idx === 0 ? "1" : "2"}>
          ${
            idx === 0
              ? (() => {
                  const parts = item.text.split("\\n");
                  return `<div class="cover-meta"><span class="school">${parts[0] || ""}</span><span class="author">${parts[1] || ""}</span><span class="date">${parts[2] || ""}</span></div><div class="cover-actions"><button class="start-btn" id="startReportBtn" type="button">寮€濮嬫眹鎶?/button><span class="start-tip">鐐瑰嚮鍚庤嚜鍔ㄦ挱鏀鹃煶涔愶紝鍙敤缈婚〉绗斻€侀紶鏍囧拰蹇嵎閿炕椤?/span></div>`;
                })()
              : `<p class="lead">${isPresenter || isFullTextView ? item.text : (item.audienceText || item.text)}</p>`
          }
        </div>
      </section>
    `).join("");

    const slides = [...document.querySelectorAll(".slide")];
    const startReportBtn = document.getElementById("startReportBtn");
    if (isPresenter) {
      autoBtn.style.display = "none";
      autoPageBtn.style.display = "none";
      musicBtn.style.display = "none";
      fullTextBtn.style.display = "none";
      presenterBtn.style.display = "none";
      bgm.muted = true;
    }
    if (isFullTextView) {
      fullTextBtn.textContent = "绮剧畝瑙嗗浘";
    }

    function resolveVoices() {
      if (!window.speechSynthesis) return;
      const voices = window.speechSynthesis.getVoices();
      selectedVoice =
        voices.find((voice) => /xiaoxiao|鏅撴檽/i.test(voice.name)) ||
        voices.find((voice) => /zh[-_]?cn|chinese|涓枃/i.test(`${voice.lang} ${voice.name}`)) ||
        null;
    }

    function updatePresenterPanel() {
      if (!isPresenter) return;
      const current = deck[currentIndex];
      const next = deck[Math.min(deck.length - 1, currentIndex + 1)];
      const compactText = (value) => (value || "")
        .split("\r").join("")
        .split("\n")
        .map((line) => line.trim())
        .filter(Boolean)
        .join("\n");
      presenterCurrentTitle.textContent = current.title;
      presenterCurrentMeta.textContent = 'Page ' + (currentIndex + 1) + ' 路 ' + current.pageLabel;
      const currentContent = document.createElement("div");
      currentContent.className = "teleprompter-content";
      currentContent.textContent = compactText(current.text);
      presenterCurrentNotes.replaceChildren(currentContent);
      presenterNextTitle.textContent = next ? next.title : 'End';
      presenterNextMeta.textContent = next ? ('Page ' + Math.min(deck.length, currentIndex + 2) + ' 路 ' + next.pageLabel) : '';
      presenterNextNotes.textContent = next ? compactText(next.text) : '';
      presenterStatus.textContent = 'Page ' + (currentIndex + 1) + ' / ' + deck.length;
      restartTeleprompter(current);
    }

    function restartTeleprompter(item) {
      if (!isPresenter || !presenterCurrentNotes) return;
      cancelAnimationFrame(presenterScrollTimer);
      const content = presenterCurrentNotes.querySelector(".teleprompter-content");
      if (!content) return;
      content.style.transform = "translateY(0)";
      requestAnimationFrame(() => {
        const maxScroll = content.scrollHeight - presenterCurrentNotes.clientHeight;
        if (maxScroll <= 12) return;
        const cleanText = (item.speechText || item.text || "").replace(/\s+/g, "");
        const speechBasedDuration = 5200 + cleanText.length * 520;
        const duration = Math.max(getItemDurationMs(item) + 4000, speechBasedDuration);
        const leadInMs = 1800;
        const startedAt = performance.now();
        const step = () => {
          const elapsed = Math.max(0, performance.now() - startedAt - leadInMs);
          const ratio = Math.min(1, elapsed / duration);
          content.style.transform = `translateY(-${maxScroll * ratio}px)`;
          if (ratio < 1) {
            presenterScrollTimer = requestAnimationFrame(step);
          }
        };
        presenterScrollTimer = requestAnimationFrame(step);
      });
    }

    function broadcastPresenterState() {
      if (syncingFromRemote) return;
      const payload = { currentIndex, ts: Date.now() };
      lastPresenterStateTs = payload.ts;
      try { localStorage.setItem(presenterStateKey, JSON.stringify(payload)); } catch {}
      if (presenterChannel) presenterChannel.postMessage(payload);
    }

    function applyRemotePresenterState(payload) {
      if (!payload || typeof payload.currentIndex !== "number") return;
      if (payload.ts && payload.ts <= lastPresenterStateTs) return;
      if (payload.ts) lastPresenterStateTs = payload.ts;
      if (payload.currentIndex === currentIndex) return;
      syncingFromRemote = true;
      goTo(payload.currentIndex);
      syncingFromRemote = false;
    }

    function sendPresenterCommand(nextIndex) {
      const payload = {
        currentIndex: Math.max(0, Math.min(deck.length - 1, nextIndex)),
        ts: Date.now()
      };
      lastPresenterCommandTs = payload.ts;
      try { localStorage.setItem(presenterCommandKey, JSON.stringify(payload)); } catch {}
      return payload;
    }

    function applyPresenterCommand(payload) {
      if (!payload || typeof payload.currentIndex !== "number") return;
      if (payload.ts && payload.ts <= lastPresenterCommandTs) return;
      if (payload.ts) lastPresenterCommandTs = payload.ts;
      syncingFromRemote = true;
      goTo(payload.currentIndex);
      syncingFromRemote = false;
    }

    function getOpenerApi() {
      try {
        if (window.opener && !window.opener.closed && window.opener.__wanderingEarthPresenterApi) {
          return window.opener.__wanderingEarthPresenterApi;
        }
      } catch {}
      return null;
    }

    function requestPresenterNavigation(delta) {
      const openerApi = getOpenerApi();
      let baseIndex = currentIndex;
      if (openerApi) {
        try {
          const state = openerApi.getState?.();
          if (state && typeof state.currentIndex === "number") {
            baseIndex = state.currentIndex;
          }
        } catch {}
      }
      const targetIndex = Math.max(0, Math.min(deck.length - 1, baseIndex + delta));
      const payload = sendPresenterCommand(targetIndex);
      if (openerApi) {
        try {
          openerApi.goTo(targetIndex);
        } catch {}
      }
      applyRemotePresenterState(payload);
    }

    function updateShell() {
      slides.forEach((slide, i) => slide.classList.toggle("active", i === currentIndex));
      counter.textContent = `${String(currentIndex + 1).padStart(2, "0")} / ${String(deck.length).padStart(2, "0")}`;
      deckProgress.style.width = `${((currentIndex + 1) / deck.length) * 100}%`;
      document.title = `銆婃祦娴湴鐞冦€嬭棰戞紨璁茬増 - ${currentIndex + 1}/${deck.length}`;
    }

    function tryPlayBgm() {
      if (isPresenter) return Promise.resolve(false);
      bgm.volume = Number(volumeRange.value) / 100;
      return bgm.play().then(() => {
        bgmPendingAutoplay = false;
        musicBtn.textContent = "鏆傚仠闊充箰";
        return true;
      }).catch(() => {
        bgmPendingAutoplay = true;
        musicBtn.textContent = "鎾斁闊充箰";
        return false;
      });
    }

    function setLoadingProgress(done, total, currentLabel = "") {
      const safeTotal = Math.max(total, 1);
      const ratio = Math.min(1, done / safeTotal);
      loadingBar.style.width = `${ratio * 100}%`;
      loadingMeta.textContent = `${done} / ${total}`;
      if (currentLabel) {
        loadingText.textContent = `姝ｅ湪鍔犺浇锛?{currentLabel}`;
      }
    }

    function preloadImage(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve();
        img.onerror = () => resolve();
        img.src = src;
      });
    }

    function preloadMediaBlob(src) {
      return new Promise((resolve) => {
        if (!src) {
          resolve();
          return;
        }
        if (preloadedMediaUrls.has(src)) {
          resolve();
          return;
        }
        fetch(src, { cache: "force-cache" })
          .then((response) => response.ok ? response.blob() : null)
          .then((blob) => {
            if (blob) preloadedMediaUrls.set(src, URL.createObjectURL(blob));
            resolve();
          })
          .catch(() => resolve());
      });
    }

    function preloadAudio(src) {
      return preloadMediaBlob(src);
    }

    function preloadVideo(src) {
      return preloadMediaBlob(src);
    }

    async function preloadAsset(asset) {
      if (asset.type === "image") await preloadImage(asset.src);
      if (asset.type === "video") await preloadVideo(asset.src);
      if (asset.type === "audio") await preloadAudio(asset.src);
    }

    async function preloadAssetsConcurrent(assets, total, startDone = 0, concurrency = 4) {
      let done = startDone;
      let cursor = 0;
      async function worker() {
        while (cursor < assets.length) {
          const index = cursor;
          cursor += 1;
          const asset = assets[index];
          await preloadAsset(asset);
          done += 1;
          setLoadingProgress(done, total, asset.src.split("/").pop());
        }
      }
      const workers = Array.from({ length: Math.min(concurrency, assets.length) }, () => worker());
      await Promise.all(workers);
      return done;
    }

    async function preloadDeckAssets() {
      if (isPresenter) {
        assetsReady = true;
        loadingScreen.classList.add("hidden");
        return;
      }
      try {
        if (isWarmOpen && localStorage.getItem(preloadReadyKey) === "1") {
          assetsReady = true;
          loadingText.textContent = "宸插鐢ㄥ綋鍓嶄細璇濈礌鏉?;
          loadingMeta.textContent = "鏃犻渶閲嶆柊鍔犺浇";
          setLoadingProgress(1, 1, "ready");
          loadCurrentBackground();
          loadingScreen.classList.add("hidden");
          status.textContent = "绱犳潗宸插氨缁?;
          return;
        }
      } catch {}
      const assets = [];
      const seen = new Set();
      const addAsset = (type, src) => {
        if (!src || seen.has(src)) return;
        seen.add(src);
        assets.push({ type, src });
      };
      deck.forEach((item) => {
        addAsset("image", item.image);
        addAsset("video", item.video);
      });
      addAsset("audio", "./assets/audio/bgm.mp3");
      addAsset("audio", "./assets/audio/bgm.aac");

      const total = assets.length;
      const priorityCount = Math.min(deck.length, 4);
      const priorityAssetKeys = new Set();
      for (let i = 0; i < priorityCount; i += 1) {
        const item = deck[i];
        if (item.image) priorityAssetKeys.add(`image:${item.image}`);
        if (item.video) priorityAssetKeys.add(`video:${item.video}`);
      }
      priorityAssetKeys.add("audio:./assets/audio/bgm.mp3");
      const priorityAssets = assets.filter((asset) => priorityAssetKeys.has(`${asset.type}:${asset.src}`));
      const remainingAssets = assets.filter((asset) => !priorityAssetKeys.has(`${asset.type}:${asset.src}`));
      const isMobileLike = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent) || window.innerWidth <= 900;
      const priorityConcurrency = isMobileLike ? 2 : 4;
      const backgroundConcurrency = isMobileLike ? 1 : 3;
      loadingText.textContent = "正在优先加载开场素材，请稍候…";
      setLoadingProgress(0, total);
      let done = await preloadAssetsConcurrent(priorityAssets, total, 0, priorityConcurrency);
      assetsReady = true;
      try { localStorage.setItem(preloadReadyKey, "1"); } catch {}
      loadingText.textContent = "开场素材已就绪，其余素材正在后台加载…";
      loadingMeta.textContent = `${done} / ${total}`;
      loadCurrentBackground();
      loadingScreen.classList.add("hidden");
      status.textContent = "开场素材已就绪";
      if (remainingAssets.length) {
        preloadAssetsConcurrent(remainingAssets, total, done, backgroundConcurrency).then((finalDone) => {
          loadingMeta.textContent = `${finalDone} / ${total}`;
          status.textContent = "全部素材加载完成";
        });
      }
    }

    function retryPendingBgm() {
      if (!bgmPendingAutoplay || !bgm.paused || isPresenter) return;
      tryPlayBgm();
    }

    function resolveMediaSrc(src) {
      return preloadedMediaUrls.get(src) || src;
    }

    function stopSpeech() {
      speechToken += 1;
      if (window.speechSynthesis) window.speechSynthesis.cancel();
    }

    function estimateDuration(text) {
      const clean = (text || "").replace(/\s+/g, "");
      const chars = clean.length;
      const ms = 2500 + chars * 340;
      return Math.max(7000, Math.min(ms, 52000));
    }

    function formatTime(ms) {
      const totalSeconds = Math.max(0, Math.floor(ms / 1000));
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
    }

    function updateTimerReadout() {
      if (!timerDisplay) return;
      const now = performance.now();
      const totalElapsed = presentationStartedAt ? now - presentationStartedAt : 0;
      const pageElapsed = now - currentPageStartedAt;
      timerDisplay.innerHTML = `<strong>璁℃椂</strong><span>鎬绘椂闀?${formatTime(totalElapsed)} 路 鏈〉 ${formatTime(pageElapsed)} / ${formatTime(currentPageTargetMs)}</span>`;
    }

    function ensureTimerReadout() {
      if (!presentationStartedAt) presentationStartedAt = performance.now();
      updateTimerReadout();
      clearInterval(timerReadoutTimer);
      timerReadoutTimer = setInterval(updateTimerReadout, 250);
    }

    function speakCurrent() {
      if (!speechEnabled || !window.speechSynthesis) return false;
      stopSpeech();
      const token = speechToken;
      const utterance = new SpeechSynthesisUtterance(deck[currentIndex].speechText || deck[currentIndex].text);
      activeUtterance = utterance;
      utterance.lang = selectedVoice?.lang || "zh-CN";
      utterance.voice = selectedVoice || null;
      utterance.rate = 0.96;
      utterance.pitch = 1;
      utterance.volume = 1;
      utterance.onstart = () => {
        if (token !== speechToken) return;
        status.textContent = "鏈楄涓?;
      };
      utterance.onerror = () => {
        if (token !== speechToken) return;
        activeUtterance = null;
        status.textContent = "鏈楄澶辫触";
        if (autoPlaying) scheduleNext(pageDurationMs[currentIndex]);
      };
      utterance.onend = () => {
        if (token !== speechToken) return;
        activeUtterance = null;
        status.textContent = "鏈楄瀹屾垚";
        if (!autoPlaying) return;
        if (currentIndex >= deck.length - 1) {
          stopAutoPlay("鎾斁瀹屾垚", { stopMedia: true });
          return;
        }
        scheduleNext(1200);
      };
      window.speechSynthesis.speak(utterance);
      return true;
    }

    function clearTimers() {
      clearTimeout(slideTimer);
      clearInterval(progressTimer);
      clearInterval(timerReadoutTimer);
    }

    function startClipProgress(durationMs) {
      currentPageStartedAt = performance.now();
      currentPageTargetMs = durationMs;
      ensureTimerReadout();
      clearInterval(progressTimer);
      const startedAt = currentPageStartedAt;
      clipProgress.style.width = "0%";
      progressTimer = setInterval(() => {
        const elapsed = performance.now() - startedAt;
        const ratio = Math.min(1, elapsed / durationMs);
        clipProgress.style.width = `${ratio * 100}%`;
        if (ratio >= 1) clearInterval(progressTimer);
      }, 100);
    }

    function playVideo() {
      if (!bgVideo.currentSrc && !bgVideo.getAttribute("src")) {
        clipInfo.textContent = "褰撳墠椤垫病鏈夊彲鎾斁鐨勮棰?;
        videoBtn.textContent = "鎾斁瑙嗛";
        return Promise.resolve(false);
      }
      if (bgVideo.readyState < 2) {
        clipInfo.textContent = "瑙嗛杩樺湪鍔犺浇涓?;
        videoBtn.textContent = "鎾斁瑙嗛";
        return Promise.resolve(false);
      }
      return bgVideo.play().then(() => {
        videoBtn.textContent = "鏆傚仠瑙嗛";
        return true;
      }).catch((err) => {
        clipInfo.textContent = `鎾斁澶辫触 - ${err && err.name ? err.name : "UnknownError"}`;
        videoBtn.textContent = "鎾斁瑙嗛";
        return false;
      });
    }

    function applyFallbackTone(item) {
      bgFallback.classList.remove("tone-cold", "tone-warm", "tone-hope", "portrait");
      veil.classList.add("image-mode");
      const label = `${item.pageLabel} ${item.title}`;
      if (label.includes("鑷磋阿") || label.includes("鎰熻阿鍒樻厛娆?)) {
        bgFallback.classList.add("portrait");
      } else if (label.includes("楂樻疆") || label.includes("澶槼") || label.includes("寮€鍦?) || label.includes("璁惧畾")) {
        bgFallback.classList.add("tone-warm");
      } else if (label.includes("甯屾湜") || label.includes("楂樿吹") || label.includes("缁撳熬") || label.includes("鎰熷彈") || label.includes("閽荤煶")) {
        bgFallback.classList.add("tone-hope");
      } else {
        bgFallback.classList.add("tone-cold");
      }
    }

    function applyMediaFraming(item) {
      const videoScale = item.videoScale || 1;
      const stillScale = item.stillScale || item.imageScale || 1.02;
      const videoPosition = item.videoPosition || item.mediaPosition || "center center";
      const fallbackPosition = item.imagePosition || item.mediaPosition || "center center";
      bgVideo.style.setProperty("--video-scale", String(videoScale));
      bgVideo.style.setProperty("--video-pos", videoPosition);
      bgFallback.style.setProperty("--still-scale", String(stillScale));
      bgFallback.style.setProperty("--fallback-pos", fallbackPosition);
    }

    function showImage(item) {
      stage.classList.toggle("video-mode", Boolean(item.video));
      applyMediaFraming(item);
      if (item.image) {
        bgFallback.src = item.image;
        bgFallback.classList.remove("hidden");
        bgFallback.classList.add("animated");
        applyFallbackTone(item);
      } else {
        bgFallback.classList.add("hidden");
        bgFallback.classList.remove("animated", "tone-cold", "tone-warm", "tone-hope", "portrait");
        veil.classList.remove("image-mode");
      }
      bgVideo.pause();
      bgVideo.ontimeupdate = null;
      bgVideo.removeAttribute("src");
      bgVideo.load();
      bgVideo.classList.add("hidden");
      applyMaskBrightness();
      clipInfo.textContent = "鍥剧墖鏄剧ず涓?;
      videoBtn.textContent = "鎾斁瑙嗛";
      videoBtn.disabled = true;
      videoBtn.style.opacity = "0.5";
    }

    function freezeVideoToAnimatedStill(item) {
      if (!bgVideo.videoWidth || !bgVideo.videoHeight) {
        showImage(item);
        return;
      }
      const canvas = document.createElement("canvas");
      canvas.width = bgVideo.videoWidth;
      canvas.height = bgVideo.videoHeight;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(bgVideo, 0, 0, canvas.width, canvas.height);
      bgFallback.src = canvas.toDataURL("image/jpeg", 0.92);
      bgFallback.classList.remove("hidden");
      bgFallback.classList.add("animated");
      applyFallbackTone(item);
      bgVideo.pause();
      bgVideo.classList.add("hidden");
      stage.classList.toggle("video-mode", Boolean(item.video));
      applyMaskBrightness();
      clipInfo.textContent = "闈欏抚灞曠ず涓?;
      videoBtn.textContent = "鎾斁瑙嗛";
      videoBtn.disabled = false;
      videoBtn.style.opacity = "1";
    }

    function loadVideo(item) {
      stage.classList.add("video-mode");
      applyMediaFraming(item);
      bgFallback.src = item.image || supportedImages.cover;
      bgFallback.classList.remove("hidden");
      bgFallback.classList.remove("animated", "tone-cold", "tone-warm", "tone-hope", "portrait");
      veil.classList.remove("image-mode");
      bgVideo.classList.remove("hidden");
      applyMaskBrightness();
      clipInfo.textContent = "瑙嗛鍔犺浇涓?;
      videoBtn.disabled = false;
      videoBtn.style.opacity = "1";

      bgVideo.onerror = () => {
        showImage(item);
      };

      let metadataReady = false;
      let canPlayReady = false;
      let started = false;
      const tryStartCurrentVideo = () => {
        if (started || !metadataReady || !canPlayReady) return;
        started = true;
        clipInfo.textContent = "鐟欏棝顣堕幘顓熸杹娑?";
        playVideo().then((ok) => {
          if (!ok) started = false;
        });
      };

      bgVideo.onloadedmetadata = () => {
        const rate = item.playbackRate || 0.9;
        let frozen = false;
        const freezeFrame = () => {
          if (frozen) return;
          frozen = true;
          bgVideo.ontimeupdate = null;
          freezeVideoToAnimatedStill(item);
        };
        bgVideo.playbackRate = rate;
        const duration = bgVideo.duration;
        if (!duration || !Number.isFinite(duration)) {
          showImage(item);
          return;
        }
        segmentStart = Math.max(0, Math.min(duration - 0.3, duration * (item.ratio || 0)));
        const targetMs = getItemDurationMs(item);
        segmentEnd = Math.min(duration, segmentStart + Math.max(6, (targetMs / 1000) * rate));
        if (segmentEnd - segmentStart < 3) {
          segmentStart = 0;
          segmentEnd = Math.min(duration, Math.max(6, (targetMs / 1000) * rate));
        }
        bgVideo.currentTime = segmentStart;
        metadataReady = true;
        bgVideo.ontimeupdate = () => {
          if (bgVideo.currentTime >= segmentEnd - 0.08) freezeFrame();
        };
        clipInfo.textContent = "瑙嗛鎾斁涓?;
        tryStartCurrentVideo();
      };

      bgVideo.onloadeddata = () => {
        canPlayReady = true;
        tryStartCurrentVideo();
      };

      bgVideo.oncanplay = () => {
        canPlayReady = true;
        tryStartCurrentVideo();
      };

      bgVideo.src = resolveMediaSrc(item.video);
      bgVideo.load();
    }

    function loadCurrentBackground() {
      if (isPresenter) {
        bgVideo.pause();
        bgVideo.ontimeupdate = null;
        bgVideo.removeAttribute("src");
        bgVideo.load();
        return;
      }
      const item = deck[currentIndex];
      if (item.video) {
        loadVideo(item);
      } else {
        showImage(item);
      }
    }

    function stopAutoPlay(text = "寰呭惎鍔?, options = {}) {
      const { stopMedia = false } = options;
      autoPlaying = false;
      speechEnabled = false;
      clearTimeout(slideTimer);
      clearInterval(progressTimer);
      stopSpeech();
      activeUtterance = null;
      if (stopMedia) {
        bgVideo.pause();
        bgm.pause();
        videoBtn.textContent = "鎾斁瑙嗛";
        musicBtn.textContent = "鎾斁闊充箰";
      }
      autoBtn.textContent = "鑷姩鎾斁鏈楄";
      autoPageBtn.textContent = "鑷姩缈婚〉";
      status.textContent = text;
      updateTimerReadout();
    }

    function scheduleNext(delayMs) {
      clearTimeout(slideTimer);
      slideTimer = setTimeout(() => {
        if (!autoPlaying) return;
        if (currentIndex >= deck.length - 1) {
          stopAutoPlay("鎾斁瀹屾垚", { stopMedia: true });
          return;
        }
        currentIndex += 1;
        updateShell();
        loadCurrentBackground();
        startClipProgress(pageDurationMs[currentIndex]);
        const speakingStarted = speakCurrent();
        if (!speakingStarted) {
          scheduleNext(pageDurationMs[currentIndex]);
        }
      }, delayMs);
    }

    function startAutoPlay() {
      autoPlaying = true;
      speechEnabled = true;
      autoBtn.textContent = "鍋滄鑷姩鎾斁";
      autoPageBtn.textContent = "鑷姩缈婚〉";
      tryPlayBgm();
      loadCurrentBackground();
      startClipProgress(pageDurationMs[currentIndex]);
      const speakingStarted = speakCurrent();
      if (!speakingStarted) {
        scheduleNext(pageDurationMs[currentIndex]);
      }
    }

    function startAutoPageOnly() {
      autoPlaying = true;
      speechEnabled = false;
      autoBtn.textContent = "鑷姩鎾斁鏈楄";
      autoPageBtn.textContent = "鍋滄鑷姩缈婚〉";
      tryPlayBgm();
      stopSpeech();
      loadCurrentBackground();
      startClipProgress(pageDurationMs[currentIndex]);
      scheduleNext(pageDurationMs[currentIndex]);
    }

    function goTo(nextIndex) {
      if (autoPlaying) stopAutoPlay("寰呭惎鍔?);
      currentIndex = Math.max(0, Math.min(deck.length - 1, nextIndex));
      updateShell();
      loadCurrentBackground();
      startClipProgress(pageDurationMs[currentIndex]);
      updatePresenterPanel();
      broadcastPresenterState();
    }

    autoBtn.addEventListener("click", () => {
      if (autoPlaying) stopAutoPlay("寰呭惎鍔?);
      else startAutoPlay();
    });

    autoPageBtn.addEventListener("click", () => {
      if (autoPlaying) stopAutoPlay("寰呭惎鍔?);
      else startAutoPageOnly();
    });

    videoBtn.addEventListener("click", () => {
      if (videoBtn.disabled) return;
      if (bgVideo.paused) playVideo();
      else {
        bgVideo.pause();
        videoBtn.textContent = "鎾斁瑙嗛";
      }
    });

    musicBtn.addEventListener("click", () => {
      if (bgm.paused) {
        tryPlayBgm();
      } else {
        bgm.pause();
        bgmPendingAutoplay = false;
        musicBtn.textContent = "鎾斁闊充箰";
      }
    });

    volumeRange.addEventListener("input", () => {
      bgm.volume = Number(volumeRange.value) / 100;
    });

    function applyMaskBrightness() {
      const opacity = Number(maskRange.value) / 100;
      veil.style.opacity = String(opacity);
    }

    maskRange.addEventListener("input", applyMaskBrightness);

    function showControls() {
      document.body.classList.add("controls-visible");
      clearTimeout(controlsTimer);
      controlsTimer = setTimeout(() => {
        document.body.classList.remove("controls-visible");
      }, 2200);
    }

    function showControlsIfTopZone(event) {
      if (!event) return;
      if (event.clientY <= Math.max(120, window.innerHeight * 0.16)) {
        showControls();
      }
    }

    async function startReport() {
      if (!assetsReady) return;
      reportStarted = true;
      if (startReportBtn) startReportBtn.style.display = "none";
      loadCurrentBackground();
      tryPlayBgm();
      if (!document.fullscreenElement) {
        try {
          await document.documentElement.requestFullscreen();
          fullscreenBtn.textContent = "閫€鍑哄叏灞?;
        } catch {}
      }
      if (!videoBtn.disabled) playVideo();
      status.textContent = "姹囨姤寮€濮?;
    }
    presenterBtn.addEventListener('click', () => {
      broadcastPresenterState();
      const url = new URL(location.href);
      url.searchParams.set('presenter', '1');
      url.searchParams.set('warm', '1');
      window.open(url.toString(), 'wandering-earth-presenter', 'width=1600,height=960');
    });
    fullTextBtn.addEventListener('click', () => {
      const url = new URL(location.href);
      if (isFullTextView) {
        url.searchParams.delete('fulltext');
      } else {
        url.searchParams.set('fulltext', '1');
      }
      url.searchParams.delete('presenter');
      url.searchParams.set('warm', '1');
      window.open(url.toString(), isFullTextView ? 'wandering-earth-audience-compact' : 'wandering-earth-audience-full', 'width=1600,height=960');
    });

    presenterPrevBtn?.addEventListener('click', () => {
      requestPresenterNavigation(-1);
    });
    presenterNextBtn?.addEventListener('click', () => {
      requestPresenterNavigation(1);
    });

    if ('BroadcastChannel' in window) {
      presenterChannel = new BroadcastChannel('wandering-earth-grade3-7min');
      presenterChannel.onmessage = (event) => {
        if (isPresenter) applyRemotePresenterState(event.data);
      };
    }
    window.addEventListener('storage', (event) => {
      if (!isPresenter || event.key !== presenterStateKey || !event.newValue) return;
      try {
        applyRemotePresenterState(JSON.parse(event.newValue));
      } catch {}
    });
    if (isPresenter) {
      try {
        const openerApi = getOpenerApi();
        if (openerApi) applyRemotePresenterState(openerApi.getState());
        const saved = localStorage.getItem(presenterStateKey);
        if (saved) applyRemotePresenterState(JSON.parse(saved));
      } catch {}
    }

    setInterval(() => {
      try {
        if (isPresenter) {
          const openerApi = getOpenerApi();
          if (openerApi) {
            applyRemotePresenterState(openerApi.getState());
            return;
          }
          const saved = localStorage.getItem(presenterStateKey);
          if (saved) applyRemotePresenterState(JSON.parse(saved));
        } else {
          const command = localStorage.getItem(presenterCommandKey);
          if (command) applyPresenterCommand(JSON.parse(command));
        }
      } catch {}
    }, 300);

    fullscreenBtn.addEventListener("click", async () => {
      if (!document.fullscreenElement) {
        await document.documentElement.requestFullscreen();
        fullscreenBtn.textContent = "閫€鍑哄叏灞?;
      } else {
        await document.exitFullscreen();
        fullscreenBtn.textContent = "鍏ㄥ睆";
      }
    });

    document.addEventListener("keydown", (event) => {
      retryPendingBgm();
      if (event.key === "ArrowRight" || event.key === "PageDown" || event.key === " " || event.key === "Enter" || event.key === "NumpadEnter" || event.key.toLowerCase() === "n") {
        event.preventDefault();
        goTo(currentIndex + 1);
      }
      if (event.key === "ArrowLeft" || event.key === "PageUp" || event.key === "Backspace" || event.key.toLowerCase() === "p") {
        event.preventDefault();
        goTo(currentIndex - 1);
      }
      if (event.key === "Home") {
        event.preventDefault();
        goTo(0);
      }
      if (event.key === "End") {
        event.preventDefault();
        goTo(deck.length - 1);
      }
      if (event.key === "F5" && !reportStarted) {
        event.preventDefault();
        startReport();
      }
      if (event.key === "Escape" && autoPlaying) {
        event.preventDefault();
        stopAutoPlay("寰呭惎鍔?);
      }
    }, { passive: false });

    document.addEventListener("wheel", (event) => {
      if (wheelLocked) return;
      if (Math.abs(event.deltaY) < 18) return;
      wheelLocked = true;
      setTimeout(() => {
        wheelLocked = false;
      }, 550);
      if (event.deltaY > 0) {
        goTo(currentIndex + 1);
      } else {
        goTo(currentIndex - 1);
      }
    }, { passive: true });

    document.addEventListener("click", () => {
      retryPendingBgm();
      if (!videoBtn.disabled) playVideo();
    }, { once: true });

    document.addEventListener("click", (event) => {
      retryPendingBgm();
      if (!isPresenter) return;
      const target = event.target;
      if (target.closest(".btn") || target.closest("input") || target.closest(".topbar") || target.closest("a")) {
        return;
      }
      if (event.clientX > window.innerWidth * 0.55) {
        requestPresenterNavigation(1);
      } else if (event.clientX < window.innerWidth * 0.45) {
        requestPresenterNavigation(-1);
      }
    });

    document.addEventListener("click", (event) => {
      retryPendingBgm();
      if (isPresenter) return;
      const target = event.target;
      if (
        target.closest(".btn") ||
        target.closest(".volume-wrap") ||
        target.closest("input") ||
        target.closest(".topbar")
      ) {
        return;
      }
      if (event.clientX > window.innerWidth * 0.55) {
        goTo(currentIndex + 1);
      } else if (event.clientX < window.innerWidth * 0.45) {
        goTo(currentIndex - 1);
      }
    });

    startReportBtn?.addEventListener("click", (event) => {
      event.stopPropagation();
      startReport();
    });

    if (window.speechSynthesis) {
      resolveVoices();
      window.speechSynthesis.addEventListener?.("voiceschanged", resolveVoices);
      window.addEventListener("beforeunload", stopSpeech);
    }

    document.addEventListener("mousemove", showControlsIfTopZone, { passive: true });
    document.addEventListener("touchstart", showControls, { passive: true });
    document.addEventListener("touchmove", showControls, { passive: true });

    updateShell();
    loadCurrentBackground();
    startClipProgress(pageDurationMs[0]);
    updatePresenterPanel();
    broadcastPresenterState();
    applyMaskBrightness();
    showControls();
    preloadDeckAssets();
  </script>
</body>
</html>
